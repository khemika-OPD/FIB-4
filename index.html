<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIB-4 & APRI Calculator - โดย เขมิกา พงษ์ศรี</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --primary: #f59e0b; /* สีส้มทองสดใส */
            --secondary: #ef4444; /* สีแดงส้ม */
            --bg: #fff7ed;
        }
        body { font-family: 'Sarabun', sans-serif; background-color: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; max-width: 450px; width: 100%; border-radius: 25px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid #ffedd5; }
        
        .header { background: linear-gradient(135deg, #f59e0b 0%, #ef4444 100%); color: white; padding: 35px 25px; text-align: center; }
        .header h1 { margin: 0; font-size: 26px; }
        .header p { margin: 5px 0 0; opacity: 0.9; font-size: 14px; }
        
        .content { padding: 30px; }
        .input-row { display: flex; gap: 15px; }
        .input-group { margin-bottom: 20px; flex: 1; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #451a03; font-size: 15px; }
        input { width: 100%; padding: 14px; border: 2px solid #fed7aa; border-radius: 12px; box-sizing: border-box; font-size: 16px; background-color: #fffaf5; transition: 0.3s; }
        input:focus { border-color: var(--primary); outline: none; background-color: white; }

        .btn-row { display: flex; gap: 10px; margin-top: 10px; }
        button.calc-btn { flex: 2; padding: 18px; background: linear-gradient(to right, #f59e0b, #ef4444); color: white; border: none; border-radius: 15px; font-size: 20px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button.calc-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(245, 158, 11, 0.3); }
        
        button.clear-btn { flex: 1; padding: 18px; background: #e2e8f0; color: #475569; border: none; border-radius: 15px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button.clear-btn:hover { background: #cbd5e1; color: #334155; }

        .result-card { margin-top: 20px; padding: 15px; border-radius: 15px; text-align: center; display: none; border: 1px solid rgba(0,0,0,0.05); }
        .result-title { font-size: 18px; font-weight: bold; margin-bottom: 5px; border-bottom: 1px dashed rgba(0,0,0,0.1); padding-bottom: 5px; }
        .score-val { font-size: 28px; font-weight: bold; }
        .status-val { font-size: 15px; margin-top: 5px; font-weight: bold; }
        
        .qr-section { text-align: center; padding: 20px; border-top: 1px dashed #fdba74; }
        .btn-qr { background: #ffedd5; color: #9a3412; padding: 8px 15px; border-radius: 20px; font-size: 13px; border: none; cursor: pointer; font-weight: bold; }
        #qrcode { display: flex; justify-content: center; margin-top: 15px; }

        .footer { background: #fffaf5; padding: 20px; text-align: center; font-size: 14px; color: #7c2d12; border-top: 1px solid #ffedd5; }
        .dev-name { color: #ef4444; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>FIB-4 & APRI Calculator</h1>
        <p>เครื่องมือประเมินภาวะพังผืดและตับแข็งเชิงคลินิก</p>
    </div>

    <div class="content">
        <div class="input-row">
            <div class="input-group">
                <label>อายุ (ปี)</label>
                <input type="number" id="age" placeholder="ระบุอายุ">
            </div>
            <div class="input-group">
                <label>AST ULN *</label>
                <input type="number" id="ast_uln" value="40" placeholder="ค่าปกติสูงสุด">
            </div>
        </div>
        
        <div class="input-row">
            <div class="input-group">
                <label>AST (U/L)</label>
                <input type="number" id="ast" placeholder="ระบุค่า AST">
            </div>
            <div class="input-group">
                <label>ALT (U/L)</label>
                <input type="number" id="alt" placeholder="ระบุค่า ALT">
            </div>
        </div>

        <div class="input-group">
            <label>Platelet Count (x10³/µL)</label>
            <input type="number" id="plt" placeholder="ระบุเกล็ดเลือด เช่น 150">
        </div>

        <div class="btn-row">
            <button class="calc-btn" onclick="calculateAll()">คำนวณผลประเมิน</button>
            <button class="clear-btn" onclick="clearAll()">ล้างข้อมูล</button>
        </div>

        <div id="fib4-box" class="result-card">
            <div class="result-title" style="color: #451a03;">ดัชนี FIB-4 Index</div>
            <div id="fib4-score" class="score-val"></div>
            <div id="fib4-status" class="status-val"></div>
        </div>

        <div id="apri-box" class="result-card">
            <div class="result-title" style="color: #451a03;">ดัชนี APRI Score</div>
            <div id="apri-score" class="score-val"></div>
            <div id="apri-status" class="status-val"></div>
        </div>
    </div>

    <div class="qr-section">
        <button class="btn-qr" onclick="toggleQR()">แสดง/ซ่อน QR สำหรับแชร์</button>
        <div id="qr-container" style="display:none;">
            <div id="qrcode"></div>
        </div>
    </div>

    <div class="footer">
        พัฒนาโดย <span class="dev-name">Khemika-OPD Takhli</span><br>
    </div>
</div>

<script>
    function calculateAll() {
        // ดึงค่าอินพุตทั้งหมดแปลงเป็นตัวเลข
        const age = parseFloat(document.getElementById('age').value);
        const ast_uln = parseFloat(document.getElementById('ast_uln').value);
        const ast = parseFloat(document.getElementById('ast').value);
        const alt = parseFloat(document.getElementById('alt').value);
        const plt = parseFloat(document.getElementById('plt').value);

        // ดึงองค์ประกอบฝั่งแสดงผล
        const fib4Box = document.getElementById('fib4-box');
        const apriBox = document.getElementById('apri-box');
        
        // รีเซ็ตการแสดงผลก่อนการคำนวณใหม่
        fib4Box.style.display = 'none';
        apriBox.style.display = 'none';

        // เช็กตัวแปรขั้นต่ำพื้นฐาน (ตัวแปรจำเป็นอย่าง AST และ เกล็ดเลือด ต้องมีเสมอ)
        if (isNaN(ast) || isNaN(plt)) {
            alert("กรุณากรอกค่า AST และ Platelet Count เป็นอย่างน้อยเพื่อทำการคำนวณค่ะ");
            return;
        }

        let hasCalculated = false;

        // 1. ตรรกะประมวลผล FIB-4 (ต้องการครบทั้ง อายุ, AST, ALT, Platelet)
        if (!isNaN(age) && !isNaN(ast) && !isNaN(alt) && !isNaN(plt) && alt > 0) {
            const fib4Formula = (age * ast) / (plt * Math.sqrt(alt));
            const fib4Score = fib4Formula.toFixed(2);
            const fib4ScoreDiv = document.getElementById('fib4-score');
            const fib4StatusDiv = document.getElementById('fib4-status');
            
            let fStatus = "", fColor = "", fBg = "";
            if (fib4Score < 1.45) {
                fStatus = "ความเสี่ยงพังผืดตับต่ำ (Low Risk)"; fColor = "#155724"; fBg = "#d4edda";
            } else if (fib4Score <= 3.25) {
                fStatus = "ความเสี่ยงปานกลาง / ไม่ชัดเจน (Indeterminate)"; fColor = "#856404"; fBg = "#fff3cd";
            } else {
                fStatus = "ความเสี่ยงสูง (High Risk / Advanced Fibrosis)"; fColor = "#721c24"; fBg = "#f8d7da";
            }
            
            fib4Box.style.display = "block";
            fib4Box.style.backgroundColor = fBg;
            fib4ScoreDiv.innerText = "FIB-4 = " + fib4Score;
            fib4ScoreDiv.style.color = fColor;
            fib4StatusDiv.innerText = fStatus;
            fib4StatusDiv.style.color = fColor;
            hasCalculated = true;
        }

        // 2. ตรรกะประมวลผล APRI (ต้องการเพียง AST, AST ULN, Platelet)
        if (!isNaN(ast) && !isNaN(ast_uln) && !isNaN(plt) && ast_uln > 0) {
            const apriFormula = ((ast / ast_uln) / plt) * 100;
            const apriScore = apriFormula.toFixed(2);
            const apriScoreDiv = document.getElementById('apri-score');
            const apriStatusDiv = document.getElementById('apri-status');
            
            let aStatus = "", aColor = "", aBg = "";
            if (apriScore <= 0.5) {
                aStatus = "ความเสี่ยงพังผืดตับต่ำ (Low Risk)"; aColor = "#155724"; aBg = "#d4edda";
            } else if (apriScore <= 1.5) {
                aStatus = "ความเสี่ยงปานกลาง (Moderate Fibrosis)"; aColor = "#856404"; aBg = "#fff3cd";
            } else {
                aStatus = "ความเสี่ยงสูงมาก / แนวโน้มตับแข็ง (High Risk / Cirrhosis)"; aColor = "#721c24"; aBg = "#f8d7da";
            }
            
            apriBox.style.display = "block";
            apriBox.style.backgroundColor = aBg;
            apriScoreDiv.innerText = "APRI = " + apriScore;
            apriScoreDiv.style.color = aColor;
            apriStatusDiv.innerText = aStatus;
            apriStatusDiv.style.color = aColor;
            hasCalculated = true;
        }

        if (hasCalculated) {
            // เลื่อนหน้าจอลงมาดูผลลัพธ์แบบนุ่มนวล
            const targetBox = fib4Box.style.display === "block" ? fib4Box : apriBox;
            targetBox.scrollIntoView({ behavior: 'smooth' });
        } else {
            alert("ข้อมูลที่ระบุไม่เพียงพอต่อการคำนวณดัชนีใด ๆ ค่ะ");
        }
    }

    function clearAll() {
        document.getElementById('age').value = '';
        document.getElementById('ast_uln').value = '40';
        document.getElementById('ast').value = '';
        document.getElementById('alt').value = '';
        document.getElementById('plt').value = '';
        
        document.getElementById('fib4-box').style.display = 'none';
        document.getElementById('apri-box').style.display = 'none';
        
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    var qrcode = new QRCode(document.getElementById("qrcode"), {
        text: window.location.href,
        width: 128,
        height: 128
    });

    function toggleQR() {
        var x = document.getElementById("qr-container");
        x.style.display = (x.style.display === "none") ? "block" : "none";
    }
</script>

</body>
</html>
